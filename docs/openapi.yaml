openapi: 3.0.3
info:
  title: Bulai Shop Content & Commerce API
  description: |
    ## Введение

    Целевая модель HTTP API для наполнения витрины и сценариев заказа. Контракты выведены из
    клиентского приложения (`src/`); реализация на бэкенде опциональна.

    Подробности по разделам API — в группах операций слева (Сайт, Промо, Контент, Каталог и т.д.).
  version: 0.1.0

servers:
  - url: https://api.example.com
    description: Production (замените на свой хост)

tags:
  - name: Site
    x-displayName: Сайт
    description: |
      Глобальные настройки магазина: логотип бренда, контакты, соцсети, юридический блок футера.

      Ответ `GET /api/site-config` в клиенте витрины распределяется по блокам интерфейса (см. описание операции).

      **Админка (React):** экран **«Настройки сайта»** (`/admin/site-settings`) редактирует только контракт **`SiteConfig`**. Промо не смешивают с этим экраном — см. группу **«Промо»** и раскрывающийся раздел **«Промо материалы»** в админ-сайдбаре (`/admin/promo-materials/ticker`, `/admin/promo-materials/banner`).

      **Эндпоинт:** `GET /api/site-config`
  - name: Promo
    x-displayName: Промо
    description: |
      Промо-материалы в шапке и смежный контент (лентa над навбаром и будущие поля — баннеры, ссылки, акции).

      Отдельно от `site-config`, чтобы маркетинговые правки не трогали контакты и футер и чтобы проще расширять схему.

      **Админка (React):** раздел **«Промо материалы»** (раскрывающийся пункт сайдбара): подпункт **«Лента»** — **`/admin/promo-materials/ticker`** (**`tickerMessages`**); **«Hero-блоки»** — **`/admin/promo-materials/banner`** (заготовка под расширение схемы **`PromoMaterials`**).

      **Промокоды:** в админке отдельный раздел **«Скидки и промокоды»** → **«Промокоды»** (`/admin/promo-codes`), где хранятся поля:
      - `name` — название акции,
      - `code` — сам промокод (канонически в верхнем регистре),
      - `percent` — процент скидки (0–100),
      - `validUntil` — дата окончания (если пусто, промокод считается бессрочным).

      **Эндпоинт:** `GET /api/promo-materials`
  - name: Content
    x-displayName: Контент
    description: |
      Редакционный контент страниц.

      **Главная (`/`):** ответ `GET /api/home` задаёт **редакционный** контент: **hero**, **«почему мы»** (`featuresSection`), **категории** (`categoriesSection`), **«наши преимущества»** (`advantagesSection`), **FAQ** (`faqSection`). Между категориями и преимуществами — блок **«Популярные товары»** (**4 карточки**): **`GET /api/products/popular`**. Популярность — это **ABC-анализ по двум параметрам** (**заказы** и **оценки/отзывы**): **группа A** = популярные; **в витрину попадают только товары из A**, из них — топ по **`limit`** (по умолчанию **4**), см. **`GET /api/products/popular`**. Рядом по смыслу с **`GET /api/products/{productId}/related`**.

      **Общий блок отзывов на главной:** витрина может повторить секцию **«Отзывы покупателей»**, как в каталоге: лента — **`GET /api/reviews`**. Кнопка **«Оставить отзыв»** после **авторизации** — **`POST /api/reviews`**: тело **`rating`** (1–5), **`text`**; **`productId`** **не обязателен** (общий отзыв о магазине без привязки к SKU). Если **`productId`** передан — отзыв также участвует в рейтинге карточки товара (пересчёт агрегатов).

      **Другие страницы:** «О компании» — `GET /api/about`; тексты вкладок «Ключевые детали» у товара — `GET /api/catalog/editorial`.

      **Эндпоинты:** `GET /api/home`, `GET /api/about`, `GET /api/catalog/editorial`
  - name: Catalog
    x-displayName: Каталог
    description: |
      Каталог с фильтрами и сортировкой, карточка товара, рекомендации по категории.

      **Списки товаров вне общей ленты каталога:** **`GET /api/products/popular`** — витрина **«Популярные на главной»** (**до 4** по умолчанию): товары только из **группы A** **ABC-анализа** по **заказам** и **оценкам (отзывам)** (две оси, удельные веса, классы A/B/C — подробно в операции). **`GET /api/products/{productId}/related`** — блок **«Рекомендуем с этим товаром»** на карточке: **персональный** набор для каждого SKU задаётся в **админ-панели**; если куратор **ничего не задал**, бэкенд отдаёт **максимально похожие** товары (как правило та же **категория** и близкие атрибуты; точный алгоритм сходства — на сервере). Оба эндпоинта возвращают **`ProductWithMeta`**. **`sort=popular`** в каталоге — **та же** метрика популярности, см. **`GET /api/products/popular`**.

      **Эндпоинты:** `GET /api/products`, `GET /api/products/popular`, `GET /api/products/{productId}`, `GET /api/products/{productId}/related`
  - name: Reviews
    x-displayName: Отзывы
    description: |
      **Два вида отзывов:** (1) **общий** — о магазине, доставке, сервисе **без** привязки к SKU: в объекте **`CatalogReview`** поле **`productId`** = **`null`**, попадает в **`GET /api/reviews`**, **не** меняет **`product.rating`** / **`product.reviews`**. (2) **о товаре** — **`productId`** задан (в теле **`POST /api/reviews`** или путём **`POST /api/products/{productId}/reviews`**): участвует в ленте общего пула (если вы отдаёте его там) и **входит** в агрегаты рейтинга этой карточки.

      **Рейтинг и счётчик на карточке:** в **`Product`** поля **`rating`** и **`reviews`** считают **только** опубликованные отзывы **с этим** **`productId`**. Общие отзывы (**`productId: null`**) к ним **не** относятся. После создания товарного отзыва бэкенд пересчитывает агрегаты.

      **Ленты:** **`GET /api/reviews`** — смешанный пул для **каталога** и **главной** (и общие, и при желании товарные записи). **`GET /api/products/{productId}/reviews`** — только отзывы **о данном** товаре.

      **Создание:** в **каталоге** и на **главной** форма **«написать отзыв»** без выбора товара → **`POST /api/reviews`** с **`rating`** и **`text`**, **без** **`productId`**. Со **страницы товара** удобнее **`POST /api/products/{productId}/reviews`** (или **`POST /api/reviews`** с **`productId`** в теле — эквивалент по смыслу).

      **Эндпоинты:** `GET /api/reviews`, `POST /api/reviews`, `GET /api/products/{productId}/reviews`, `POST /api/products/{productId}/reviews`
  - name: Cart
    x-displayName: Корзина
    description: |
      **Как устроено в текущем витринном клиенте:** корзина хранится на стороне браузера (**`CartContext`**): список **строк** с **`productId`**, подписью **цвета** и **размера**, **количеством** и ценами для отображения. Открывается **выдвижная панель** (`CartDrawer`), счётчик в шапке, переход на **оформление заказа** с тем же составом.

      **Что делает API в этой спецификации:** отдельного ресурса «серверная корзина» (**`GET` / `PATCH` корзины**) здесь **нет** — полный состав покупатель отправляет один раз в **`POST /api/checkout`** в виде **`CheckoutRequest.lines`**. Промокод нужен **до** чекаута, чтобы показать скидку в UI: для этого **`POST /api/cart/promo/validate`**.

      **Промокод и регистр:** в форме пользователь может ввести код в любом регистре; **клиент перед запросом** приводит строку к **верхнему регистру** (и обычно **`trim`** по краям), чтобы единообразно сравнивать с справочником на сервере и не дублировать варианты `hello15` / `HELLO15`. Сервер при желании может дополнительно нормализовать вход — но для контракта с текущим фронтом зафиксировано: **в теле validate ожидается канонический вид кода в верхнем регистре**.

      **Связь с заказом:** если промокод применён, тот же код передают опционально в **`CheckoutRequest.promoCode`**; бэкенд **повторно** проверяет правило и пересчитывает итог (состав корзины или срок действия кода могли измениться после `validate`).

      **Эндпоинт:** `POST /api/cart/promo/validate`
  - name: Checkout
    x-displayName: Оформление заказа
    description: |
      Создание заказа после заполнения контактов и доставки на клиенте.

      Тексты про **доставку** и **возврат** для покупателя (в т.ч. **по каждой позиции товара**, если так заведено в **админ-панели заказов / продаж**) выводят в сценарии **чекаута**, подтверждения и писем — **не** в аккордеоне карточки товара (`GET /api/products/{productId}`).

      **Эндпоинт:** `POST /api/checkout`
  - name: Profile
    x-displayName: Профиль
    description: |
      **Назначение:** персональные и контактные данные **авторизованного** покупателя для страницы **`/profile`**, подстановки в **оформление заказа** (чекаут), рассылок и поддержки. Не путать с публичным **`GET /api/site-config`** (контакты магазина) — здесь только **личный** контекст пользователя.

      **Связь с входом:** после **email** или **Яндекс OAuth** бэкенд может **предзаполнять** профиль из учётной записи (имя, почта, телефон, день рождения, URL аватара провайдера). Покупатель правит поля в форме; актуальная копия хранится на сервере и отдаётся в **`GET /api/me/profile`**.

      **Обновление:** **`PATCH /api/me/profile`** — как правило **частичное**: в теле передают только изменённые поля; сервер **мержит** с сохранённым профилем и возвращает **полный** актуальный объект (как в **`GET`**). Поля, не входящие в запрос, **не** обнуляются.

      **Уведомления:** **`notifyReceiveMethod`** (`sms` | `email` | `all`) задаёт **канал** доставки; **`notifyOrders`** и **`notifyPromotions`** — **включены ли** соответственно письма/SMS о заказах и об акциях (при выключенном флаге канал для этой категории не используют, даже если в методе выбрано «всё» — политика на стороне API).

      **Аватар:** в демо-клиенте локальный выбор файла; в целевом API допускается **`avatarUrl`** в профиле (URL после загрузки в хранилище или от IdP) либо отдельная операция загрузки — на усмотрение бэкенда.

      **Безопасность:** оба метода под **`bearerAuth`** (тот же токен, что для **`GET /api/me/orders`** и **`POST /api/reviews`**).

      **Эндпоинты:** `GET /api/me/profile`, `PATCH /api/me/profile`
  - name: Orders
    x-displayName: Заказы
    description: |
      **Покупатель (личный кабинет):** история заказов — **`GET /api/me/orders`**. Тело элемента — схема **`Order`**: номер, дата оформления (`placedIso`), суммы в рублях, строки **`OrderLine`** (цена/скидка/итого по строке, цвет, размер, ссылка на товар). При расширении API сюда же логично добавить **даты доставки и отправки**, **трек-номер**, **ссылку отслеживания**, **статус оплаты** и **этап выполнения** — см. опциональные поля в **`Order`** и перечисления **`OrderPaymentStatus`**, **`OrderPaymentMethod`**, **`OrderStage`**.

      **Админ-панель:** экран **`/admin/orders`** (список, канбан, календарь, карточка заказа) в демо-клиенте хранит черновик в **localStorage**; целевой контракт для бэкенда — схема **`AdminOrder`** (строки **`AdminOrderLineItem`**). Операции **`GET /api/admin/orders`** и **`PUT /api/admin/orders`** описывают полную выдачу и сохранение списка (как кнопка «Сохранить» на экране).

      **Доставка и возврат:** формулировки для покупателя (в т.ч. **по позициям**) задаются в админке и попадают в ответы заказов / чекаута / писем. На **витринной** карточке товара — только **«Особенности»** и **«Уход»**.

      **Эндпоинты:** `GET /api/me/orders` · `GET /api/admin/orders` · `PUT /api/admin/orders` (последние два — целевой контракт под админку, с авторизацией и правами оператора)

paths:
  /api/site-config:
    get:
      tags: [Site]
      summary: Логотип, контакты, соцсети, юр. блок футера
      description: |
        Единый объект настроек витрины. После загрузки фронтенд подставляет поля в следующие места (ориентир — текущий React-клиент):

        **`brand`** (необязательно) — логотип, цвет знака, доступность и ссылка по клику.

        **Что отдаёт API (что получает клиент)** — строки; **пустая строка** трактуется как «значение не задано»:
        - **`logoUrl`** — публичный URL файла логотипа (после загрузки в хранилище/CDN) или пусто, если свой файл не нужен.
        - **`logoColor`** — акцентный цвет знака в формате **`#RRGGBB`** или пусто (тогда клиент берёт цвет из темы витрины).
        - **`logoAlt`** — короткое текстовое имя магазина/бренда для `aria-label`, `title`, скрытого текста у ссылки и программ чтения с экрана.
        - **`logoHref`** — куда вести по клику по знаку: внутренний путь (например `/`) или полный URL.

        **Как витринный клиент сочетает поля** (ориентир — текущий React-клиент; без `brand` или с пустыми полями — те же правила по умолчанию):
        - Пустой **`logoUrl`**, пустой **`logoColor`** — показывается **встроенный векторный знак**, цвет из темы (`currentColor`).
        - Пустой **`logoUrl`**, задан **`logoColor`** — тот же **встроенный знак**, заливка **`logoColor`**.
        - Задан **`logoUrl`**, пустой **`logoColor`** — обычная картинка **`<img src="logoUrl">`** без перекраски на стороне CSS.
        - Заданы **оба** — перекраска через **CSS `mask-image`**: по **альфе** файла строится силуэт, поверх заливается **`logoColor`** (нужен файл с **прозрачным фоном** и осмысленной маской; сплошной прямоугольник без альфы даёт некорректный эффект).

        **Требования к файлу для смены цвета:** прозрачность (PNG/WebP с альфой, SVG без залитой подложки); многослойные цветные SVG с вложенным растром могут вести себя непредсказуемо. **Соотношение сторон:** ориентир **~7,3 : 1** (широкая горизонтальная плашка, как viewBox **601.85×82.3** у встроенного знака); на клиенте высота порядка **32px**, ширина **до 200px**.

        **Где показывается знак:** центр **навбара** (ссылка), крупный блок на **`/about`**, компактный вариант в модалках **входа**, приветствия после **Яндекс OAuth** и **«Спасибо за покупку»** на чекауте.

        **Производство:** в ответе API предпочтительно отдавать **`logoUrl`** как стабильный **HTTPS**-URL; строки вида **`data:`** допустимы в черновиках/демо, но для кэша и политик безопасности на витрине обычно загружают файл на сервер и подставляют публичный URL.

        **`contact`**
        - `phoneDisplay` / `phoneTel` — один номер в двух представлениях для **кликабельного** звонка (`href` = `tel:` + `phoneTel`). В **полосе шапки** номер показывают **только с `sm`** (крупный акцентный текст); **до `sm`** в шапке телефон **не выводят** (доступен в **выезжающем мобильном меню**: видимый `phoneDisplay` и ссылка `tel:`).
        - Логика ввода номера в админке (`/admin/site-settings`): одна строка с автоопределением страны. До определения страны принудительная маска не применяется. После определения формат отображения:
          - **BY:** `+375 ** ***-**-**`
          - **RU:** `+7 *** ***-**-**`
        - При сохранении `phoneTel` нормализуют для `tel:` (только `+` и цифры, без пробелов/скобок/дефисов), а `phoneDisplay` хранят как отформатированный текст для UI.
        - `email` — `mailto:` в **мобильном меню** и на **`/contacts`**; в узкой полосе шапки **не дублируют**.
        - `addressDisplay` — полный почтовый или юридический адрес **одной строкой** (как для покупателя на сайте): город, улица, дом, офис. Выводится в разделе **«Адрес»** на странице **`/contacts`**; пустую строку можно не показывать или скрыть блок.

        **`socialLinks`**
        - Источник данных — админка **`/admin/site-settings`** (секция «Соцсети»): отсюда отправляется **полный список** соцсетей/мессенджеров.
        - Для каждого элемента передаются:
          - `id` — ключ логотипа/иконки (фронтенд выбирает бренд-иконку по этому ключу),
          - `href` — ссылка на профиль/канал/чат,
          - `name` — подпись для доступности (`aria-label`).
        - Иконки и ссылки в **футере** на всех страницах (десктоп и мобилка).
        - Те же соцсети дублируются в **нижней части выезжающего мобильного меню** шапки.

        Промо-лента **не входит** в `SiteConfig`: только **`GET /api/promo-materials`** (`PromoMaterials.tickerMessages`); в админке — **«Промо материалы» → Лента** (`/admin/promo-materials/ticker`).

        **`footer`**
        - `legalEntityLine` — реквизиты продавца в **футере**. В админке (`/admin/site-settings`) поле поддерживает **построчный ввод**: одна строка = один реквизит (например, юрлицо/ИП, УНП, расчетный счет, банк).
        - `shopNameLine` — подпись магазина в футере (обычно копирайт и название, например `© 2026 Интернет-магазин ...`).
        - В типовом UI футера `shopNameLine` показывают **первой частью**, затем `legalEntityLine`; если `legalEntityLine` многострочный, клиент может склеить строки в одну через запятую для компактного варианта отображения.
      operationId: getSiteConfig
      responses:
        '200':
          description: Настройки витрины; куда подставлять поля — см. описание операции выше и схему `SiteConfig`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SiteConfig'

  /api/promo-materials:
    get:
      tags: [Promo]
      summary: Промо-материалы шапки (лента и задел под расширения)
      description: |
        Данные для промо-зоны сайта: сейчас — строки для карусели в **индиго-полосе над навбаром** (`tickerMessages`).
        Схему ответа можно дополнять новыми полями (баннеры, ссылки на акции, расписание показа и т.д.)
        без изменения `GET /api/site-config`.

        Для промокодов допускается дополнительное поле **`promoCodes`** (массив `PromoCode`):
        `name`, `code`, `percent`, `validUntil`. Если `validUntil` не задан, период действия бессрочный.

        Клиент витрины подгружает ресурс **отдельно** от `site-config` (удобнее кэш и инвалидация). В админ-панели: сайдбар **«Промо материалы»** (раскрывается) — **«Лента»** (`/admin/promo-materials/ticker`), **«Hero-блоки»** (`/admin/promo-materials/banner`); не в **«Настройках сайта»**.
      operationId: getPromoMaterials
      responses:
        '200':
          description: Промо-материалы; см. схему `PromoMaterials`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PromoMaterials'

  /api/home:
    get:
      tags: [Content]
      summary: Контент главной (hero, блоки, FAQ)
      description: |
        Единый JSON для страницы **`/`** (главная). Ориентир по текущему React-клиенту: секции идут **в этом порядке** при прокрутке.

        **`hero`** — полноэкранный блок под навбаром: фоновые градиенты на стороне клиента; из API — **бейдж** (`badgeText`, опционально `badgeLinkHref` / `badgeLinkLabel` для встроенной ссылки), **заголовок** из строк `titleLines` (каждая строка — отдельная визуальная линия), **подзаголовок** `subtitle`, кнопка **CTA** (`ctaLabel`, `ctaHref` — внутренний путь или URL).

        **`featuresSection`** — блок «почему мы» / преимущества в сетке: `eyebrow` (маленькая строка над заголовком), `title`, `subtitle`, массив **`items`** (`HomeFeature`: название, описание, `icon` — ключ для иконки на фронте: `truck`, `shield`, `arrowPath`, `lock`).

        **`categoriesSection`** — превью категорий: `title`, подпись и адрес ссылки в каталог (`catalogLinkLabel`, `catalogHref`), массив **`cards`** (`HomeCategoryCard`: имя, описание, `imageUrl`, `href`; `featuredTitle` — визуально выделить заголовок карточки).

        Блок **«Популярные товары»** (до **4** позиций из **класса A** ABC по заказам и оценкам) между категориями и преимуществами **не входит** в этот JSON: **`GET /api/products/popular`** (см. **«Каталог»**).

        Секция **«Отзывы покупателей»** на **`/`** (если клиент её показывает) тоже **не** в `HomeContent`: лента — **`GET /api/reviews`**; создание — **`POST /api/reviews`** (общий отзыв **без** обязательного **`productId`**), с **авторизацией** на бэкенде.

        **`advantagesSection`** — под блоком популярных: заголовок секции (`title`) и **`items`** (`HomeServicePoint`: заголовок пункта, текст, `illustrationImageUrl` — картинка слева от текста).

        **`faqSection`** — аккордеон внизу страницы: `eyebrow`, `title`, вводный абзац `lead`, массив **`items`** с полями `question` и `answer` (развёрнутый текст ответа, допускается простой перенос строк).

        Поля и вложенные объекты могут быть опциональными на стороне бэкенда; клиент подставляет дефолты, если объект отсутствует.
      operationId: getHomeContent
      responses:
        '200':
          description: Контент главной; структура — `HomeContent`, назначение секций — в описании операции выше.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HomeContent'

  /api/about:
    get:
      tags: [Content]
      summary: Страница «О компании»
      operationId: getAboutContent
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AboutContent'

  /api/catalog/editorial:
    get:
      tags: [Content]
      summary: Редакционный блок каталога (вкладки «Ключевые детали»)
      operationId: getCatalogEditorial
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CatalogEditorial'

  /api/products:
    get:
      tags: [Catalog]
      summary: Список товаров с фильтрами и сортировкой
      description: |
        Основной список каталога с фильтрами и сортировкой. **`sort=popular`** упорядочивает выдачу по **той же модели популярности**, что и **`GET /api/products/popular`**: **ABC по двум параметрам** (заказы + оценки/отзывы), **составной балл** (сумма удельных весов), класс **A** = популярные для витрины (подробно в **`GET /api/products/popular`**).
      operationId: listProducts
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - name: category
          in: query
          description: Slugs через запятую (novinki,mayki,rubashki,bryuki)
          schema:
            type: string
        - name: sizes
          in: query
          schema:
            type: string
            description: Значения через запятую
        - name: colors
          in: query
          schema:
            type: string
        - name: priceFrom
          in: query
          schema:
            type: number
        - name: priceTo
          in: query
          schema:
            type: number
        - name: fit
          in: query
          schema:
            $ref: '#/components/schemas/Fit'
        - name: material
          in: query
          schema:
            $ref: '#/components/schemas/Material'
        - name: season
          in: query
          schema:
            $ref: '#/components/schemas/Season'
        - name: inStockOnly
          in: query
          schema:
            type: boolean
            default: false
        - name: sort
          in: query
          description: |
            Сортировка текущей **страницы каталога**. `popular` — по **баллу популярности** и **ABC** (заказы + оценки), как в **`GET /api/products/popular`**. При равенстве баллов и нулевых знаменателях — **сначала свежее обновление товара** (`updatedAt`). Блок на главной — только **класс A**, до **4** позиций (`limit` по умолчанию).
          schema:
            type: string
            enum: [popular, rating, priceAsc, priceDesc]
            default: popular
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [items, total]
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/ProductWithMeta'
                  total:
                    type: integer
                    minimum: 0

  /api/products/popular:
    get:
      tags: [Catalog]
      summary: Популярные для главной (ABC по заказам и оценкам, класс A, по умолчанию 4)
      description: |
        Выборка для блока **«Популярные товары»** на **`/`**. На главной — **4 карточки**; по умолчанию **`limit=4`**.

        **Модель — ABC-анализ по двум параметрам: заказы и оценки (отзывы).** **Группа A** — это как раз сегмент **«популярные»**; **в этот блок попадают только товары из A**, не B и не C.

        **Шаги (должны совпадать по смыслу с `GET /api/products?sort=popular`):**

        1. **Параметр «заказы»:** по всей базе считают **общий** объём вовлечённости товаров в заказах (согласованное правило: строки заказов, уникальные заказы и т.д.). Для каждого товара — **удельный вес по заказам** = доля этого товара в **общем** объёме (число по товару / сумма по всем товарам).
        2. **Параметр «оценки / отзывы»:** по **всем отзывам** — сколько приходится на каждый товар, **общее** число отзывов. **Удельный вес по отзывам** = отзывы на товар / всего отзывов.
        3. **Составной балл** товара = удельный вес по заказам **+** удельный вес по отзывам.
        4. **ABC-классификация:** по накопленным долям при сортировке по убыванию балла (классический **ABC / Парето**) или по фиксированным порогам — товары относят к **A**, **B**, **C**. Конкретные границы A/B/C задаёт бэкенд.
        5. В ответ API попадают **только товары класса A**, отсортированные **по убыванию** составного балла; из них возвращают не более **`limit`** позиций. Если в A меньше товаров, чем `limit`, в ответе меньше элементов.

        **Нулевые знаменатели и ничьи:** при невозможности посчитать долю (ноль в знаменателе) и при **равенстве** баллов (и других коллизиях ранжирования) порядок на бэкенде **разруливают по дате обновления товара** — **выше** тот, у кого обновление **свежее** (более поздняя метка `updatedAt` / аналог в модели товара).
      operationId: listPopularProducts
      parameters:
        - name: limit
          in: query
          description: Сколько товаров вернуть; для блока на главной ориентир — **4**.
          schema:
            type: integer
            default: 4
            minimum: 1
            maximum: 24
      responses:
        '200':
          description: Популярные товары с метаданными для карточек витрины; схема — `PopularProductsResponse`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PopularProductsResponse'

  /api/products/{productId}:
    get:
      tags: [Catalog]
      summary: Карточка товара с метаданными
      description: |
        Полные данные для страницы товара (**`/product/{productId}`** в текущем клиенте): галерея, цена, рейтинг, выбор цвета/размера, корзина, блок «Дополнительная информация», превью для отзывов, контекст для **рекомендаций** (отдельно **`GET /api/products/{productId}/related`**) и для **отзывов** (**`GET/POST .../reviews`**).

        **`product`** — то, что показывают покупателю как **SKU-витрину**: идентификатор, название, **цена** (`price`, опционально `oldPrice` / `discount`), **рейтинг** и **число отзывов** (`rating`, `reviews`), **размеры**, **цвета** (`colors`: название, **`image`** варианта для галереи, для кружка — **`hex`** и/или **`className`**). Базовое **`image`** — запасной кадр, если цвет один. Поле **`updatedAt`** (если отдаёте) используют для согласованных правил сортировки при ничьях (см. **`GET /api/products/popular`**).

        **`meta`** — **каталожные атрибуты**, не всегда видимые отдельной строкой, но нужные фильтрам, текстам и логике: **категория**, флаг **новинки**, **посадка** (fit), **материал**, **сезон**, **наличие** (`inStock` — блокировка «В корзину», бейдж «В наличии» / «Нет в наличии»).

        **Расширение карточки (поверх списка каталога):**
        - **`richDescription`** — развёрнутое описание (plain или HTML по договорённости); клиент может показывать вместо или вместе с шаблонным абзацем из `meta`.
        - **`accordionSections`** — только **«Особенности»** и **«Уход»** (см. **`ProductAccordionSections`**):
          - **`features`** — объект **`ProductAccordionFeatures`**: отдельные поля **`category`**, **`fit`**, **`material`**, **`season`** (строки для вывода; часто согласованы с **`meta`**, но могут быть переопределены в админке) и массив **`any`** — прочие пункты (пошив, фурнитура, дисклеймер и т.д.).
          - **`care`** — массив строк **«Уход»** (этикетка, стирка, сушка …).

        **«Доставка»** и **«Возврат»** на карточке товара **не задаются**: эти тексты и правила вводятся в **админ-панели заказов** (в т.ч. **для каждого товара** при необходимости) и показываются в **оформлении заказа**, **истории заказов** и связанных уведомлениях — см. группы **«Оформление заказа»** и **«Заказы»**.

        **Полный перечень полей тела ответа `200` (схема `ProductWithMetaRich`):**

        - **`product`** (объект, обязательно) — витрина SKU:
          - обязательные: **`id`**, **`name`**, **`price`**, **`image`**, **`rating`**, **`reviews`**, **`sizes`** (массив строк), **`colors`** (массив объектов);
          - в каждом элементе **`colors`**: обязательные **`name`**, **`image`** (URI); для кружка переключателя — **`hex`** (предпочтительно) и/или опционально **`className`**;
          - опционально: **`oldPrice`**, **`discount`** (строки), **`updatedAt`** (строка `date-time`).
        - **`meta`** (объект, обязательно) — все поля обязательны: **`category`**, **`isNew`**, **`fit`**, **`material`**, **`season`**, **`inStock`** (значения перечислений — в схемах `ProductCategory`, `Fit`, `Material`, `Season`).
        - **`richDescription`** (строка, опционально).
        - **`accordionSections`** (объект, опционально) — **`features`** (**объект** `category`, `fit`, `material`, `season`, **`any`**: string[]) и **`care`** (string[]). Доставка/возврат — **заказы** / **Checkout**.

        В **`GET /api/products`**, **`GET /api/products/popular`** и **`GET /api/products/{productId}/related`** каждый элемент — **`product` + `meta`** (`ProductWithMeta`), без **`richDescription`** и **`accordionSections`**.

        Ответ **`404`**, если `productId` неизвестен или товар снят с публикации.
      operationId: getProduct
      parameters:
        - $ref: '#/components/parameters/ProductId'
      responses:
        '200':
          description: Карточка с **`product`**, **`meta`**, опционально **`richDescription`**, **`accordionSections`** (**`features`**, **`care`** только) — см. `ProductWithMetaRich`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductWithMetaRich'
        '404':
          description: Товар не найден или недоступен

  /api/products/{productId}/related:
    get:
      tags: [Catalog]
      summary: Рекомендуемые к товару (админка или похожие по каталогу)
      description: |
        Выдача для блока **«Рекомендуем с этим товаром»** на странице **`/product/{productId}`**.

        **Приоритет 1 — админ-панель:** для каждого товара отдельным функционалом задают **ручной** список рекомендуемых SKU (порядок и состав). Если для данного **`productId`** такой список **есть** и в нём достаточно позиций, **`items`** формируют **из него** (с учётом **`limit`**).

        **Приоритет 2 — автоподбор:** если ручной набор **пуст** или не заполнен до нужного числа, недостающие (или все) позиции добирают **алгоритмом похожести** по данным каталога — как правило **та же категория**, близкие **материал** / **сезон** / **посадка**, при необходимости дополнительные сигналы (совместные покупки и т.д.). Цель — показать **максимально схожие** товары текущему.

        Исходный товар в **`items`** не дублируют. Порядок в массиве — порядок показа на витрине. Параметр **`limit`** ограничивает длину списка (по умолчанию 4).
      operationId: getRelatedProducts
      parameters:
        - $ref: '#/components/parameters/ProductId'
        - name: limit
          in: query
          description: Максимум рекомендаций в ответе (ручных + автодобор до этого числа).
          schema:
            type: integer
            default: 4
            maximum: 12
      responses:
        '200':
          description: Массив **`items`** (`ProductWithMeta`); источник — см. описание операции (админка → похожие).
          content:
            application/json:
              schema:
                type: object
                required: [items]
                description: Рекомендуемые товары; каждый элемент — как в списке каталога (`product` + `meta`).
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/ProductWithMeta'

  /api/reviews:
    get:
      tags: [Reviews]
      summary: Отзывы для блока каталога (общий пул)
      description: |
        Смешанная лента отзывов по магазину — для блока **каталога** и при необходимости **главной**. В ней бывают **общие** отзывы (**`productId: null`**) и при необходимости отзывы о конкретном SKU (**`productId`** заполнен) — тогда клиент может дать ссылку на **`/product/{productId}`**.

        Создание записей для этой ленты с формы **без выбора товара** — **`POST /api/reviews`** (см. ниже).
      operationId: listStoreReviews
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReviewListResponse'
    post:
      tags: [Reviews]
      summary: Оставить отзыв в общий пул (товар не обязателен)
      description: |
        Создаёт отзыв для ленты **`GET /api/reviews`**. Тело — **`rating`** (1–5), **`text`**; поле **`productId`** **опционально**.

        **Без **`productId`** (или `null`):** общий отзыв о магазине / сервисе — **не** влияет на **`product.rating`** и **`product.reviews`**.

        **С **`productId`:** отзыв привязывается к товару; бэкенд **пересчитывает** агрегаты карточки (как при **`POST /api/products/{productId}/reviews`**).

        Типичный сценарий **каталога** и **главной:** пользователь вводит только оценку и текст, **без** выбора SKU.

        Требуется **авторизация** на бэкенде (идентификация автора для **`name`** / **`avatar`** в выдаче — по политике API).
      operationId: createStoreReview
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WriteStoreReviewBody'
      responses:
        '201':
          description: Отзыв создан; при необходимости тело с созданным **`CatalogReview`**
        '401':
          description: Не авторизован

  /api/products/{productId}/reviews:
    get:
      tags: [Reviews]
      summary: Отзывы по товару
      description: |
        Все **опубликованные** отзывы, привязанные к **`productId`** из пути. Связь: у каждой записи в **`items`** тот же товар (в схеме **`CatalogReview`** может быть явное **`productId`** или подразумевается из URL).

        Поля **`productRating`** и **`reviewCount`** в ответе (если отдаёте) должны **совпадать по смыслу** с **`product.rating`** и **`product.reviews`** в **`GET /api/products/{productId}`** на тот же момент времени.

        Сортировка **`items`** (например сначала новые) — на усмотрение бэкенда; клиент использует **`total`** для пагинации вместе с **`page`** / **`pageSize`**.
      operationId: listProductReviews
      parameters:
        - $ref: '#/components/parameters/ProductId'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ReviewListResponse'
                  - type: object
                    properties:
                      productRating:
                        type: number
                        description: Средняя оценка товара (как в карточке)
                      reviewCount:
                        type: integer
    post:
      tags: [Reviews]
      summary: Оставить отзыв о конкретном товаре (требуется авторизация)
      description: |
        Создаёт отзыв **о товаре** из пути **`{productId}`**. Тело — **`rating`** (1–5) и **`text`**, см. **`WriteReviewBody`**.

        Удобная точка входа со **страницы товара**, где **`productId`** уже известен. Для **каталога** / **главной** без привязки к SKU используют **`POST /api/reviews`** **без** **`productId`**.

        После **`201`** сервер **пересчитывает** **`product.rating`** и **`product.reviews`**; в выдачах товаров приходят обновлённые значения.
      operationId: createProductReview
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ProductId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WriteReviewBody'
      responses:
        '201':
          description: Создано
        '401':
          description: Не авторизован

  /api/cart/promo/validate:
    post:
      tags: [Cart]
      summary: Проверка промокода (код в верхнем регистре на клиенте)
      description: |
        Проверка купона **без** создания заказа — для подсказки в **корзине** и на **странице оформления**, до нажатия «Оплатить».

        **Нормализация на клиенте:** из поля ввода берут строку, **`trim`**, затем **`toUpperCase()`** (как в демо **`applyPromo`**). В JSON уходит уже **`code`** в верхнем регистре, без лишних пробелов.

        **Смысл ответа:** при **`valid: true`** поле **`percent`** (0–100) — доля скидки, начисляемая с **промежуточного итога** корзины: это сумма по **актуальным ценам строк** (уже с учётом скидок на товары в витрине), **до** применения промокода. В демо-клиенте скидка по промокоду считается как `round(subtotal * percent / 100)`. При **`valid: false`** код неизвестен, истёк, исчерпан по лимитам или не подходит к корзине — **`percent`** не передают или возвращают **0**; клиент показывает ошибку и не меняет итог.

        **Повторная проверка:** эндпоинт **не** резервирует код и **не** фиксирует сессию: при **`POST /api/checkout`** сервер снова валидирует **`promoCode`** и считает финальную сумму.

        **Ошибки:** **`400`** — нет тела, нет поля **`code`**, неверный тип.
      operationId: validatePromo
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PromoValidateRequest'
            examples:
              upperCaseCode:
                summary: Канонический вид (как после нормализации на клиенте)
                value:
                  code: HELLO15
      responses:
        '200':
          description: Код проверен; дальнейшие действия по полю **`valid`**.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PromoValidateResponse'
              examples:
                validPercent:
                  summary: Код действителен, скидка в процентах
                  value:
                    valid: true
                    percent: 15
                invalid:
                  summary: Код не принят
                  value:
                    valid: false
        '400':
          description: Некорректное тело запроса (например отсутствует **`code`**)

  /api/checkout:
    post:
      tags: [Checkout]
      summary: Создать заказ
      description: |
        Принимает корзину и контакты. В ответе и в последующих данных заказа клиент может показывать **условия доставки и возврата**, заданные в **админ-панели** (в т.ч. **по товарам**), — **не** из `accordionSections` карточки товара.

        **Промокод:** если передан **`promoCode`**, сервер проверяет его **ещё раз** (состав **`lines`**, лимиты, сроки) и считает итоговую сумму заказа; опора только на прошлый ответ **`POST /api/cart/promo/validate`** недостаточна. Код в том же каноническом виде, что и для validate (**верхний регистр** на клиенте).
      operationId: createOrder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CheckoutRequest'
      responses:
        '201':
          description: Заказ принят
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CheckoutResponse'
        '400':
          description: Ошибка валидации
        '401':
          description: Требуется вход

  /api/me/profile:
    get:
      tags: [Profile]
      summary: Профиль покупателя
      description: |
        Возвращает **текущий** профиль пользователя, привязанного к токену (**`sub`** / идентификатор сессии — по реализации auth).

        **Состав** — см. **`UserProfile`**: ФИО, контакты, адрес (страна, город, индекс, улица, регион), дата рождения, настройки уведомлений, опционально **`avatarUrl`**. Если пользователь только что зарегистрировался, часть полей может быть **пустой** или заполнена из **OAuth** / первичной регистрации.

        Клиент использует ответ для формы на **`/profile`** и может подставлять **`email`**, **`phone`**, ФИО и адрес в чекаут (**`POST /api/checkout`**), чтобы не вводить повторно.
      operationId: getMyProfile
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Текущий профиль; структура — **`UserProfile`**.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '401':
          description: Нет или просрочен токен
    patch:
      tags: [Profile]
      summary: Обновить профиль
      description: |
        **Частичное** обновление: JSON может содержать **любое подмножество** полей **`UserProfile`**; отсутствующие ключи на сервере **не** сбрасываются.

        **Ответ `200`** — **полный** профиль после слияния (удобно сразу обновить форму на клиенте).

        **Валидация:** некорректный **`email`**, формат телефона и т.д. — **`400`** с описанием ошибок (схема ошибки — по договорённости). Попытка сменить read-only поля (например внутренний id) — **`400`** или игнорирование полей — на политику API.
      operationId: patchMyProfile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserProfile'
            description: Одно или несколько полей профиля для обновления.
      responses:
        '200':
          description: Профиль после сохранения (полный объект).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '400':
          description: Ошибка валидации полей
        '401':
          description: Нет или просрочен токен

  /api/me/orders:
    get:
      tags: [Orders]
      summary: История заказов
      description: |
        Список заказов пользователя. Детали **доставки** и **возврата**, заведённые в **админ-панели** для заказа или позиций, при необходимости включают в модель ответа (строки заказа, вложенные тексты — по мере расширения схемы **`Order`** / **`OrderLine`**); витринная карточка товара этих секций не содержит.
      operationId: listMyOrders
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [orders]
                properties:
                  orders:
                    type: array
                    items:
                      $ref: '#/components/schemas/Order'
        '401':
          description: Не авторизован

  /api/admin/orders:
    get:
      tags: [Orders]
      summary: Список заказов (админ-панель)
      description: |
        Целевой ответ для экрана **`/admin/orders`**: все заказы в формате **`AdminOrder`**, как в черновике админки (номер, клиент, даты, оплата, этап, трек, позиции).

        В текущем React-клиенте данные лежат в **localStorage** (`bulai-shop-admin-orders-v1`); при внедрении API этот метод заменяет или синхронизирует локальное хранилище.
      operationId: listAdminOrders
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Полный список заказов для админки
          content:
            application/json:
              schema:
                type: object
                required: [orders]
                properties:
                  orders:
                    type: array
                    items:
                      $ref: '#/components/schemas/AdminOrder'
        '401':
          description: Не авторизован
    put:
      tags: [Orders]
      summary: Сохранить список заказов (админ-панель)
      description: |
        Полная замена списка заказов на сервере телом запроса (аналог «Сохранить» внизу **`/admin/orders`**). Клиент отправляет **весь** массив **`orders`**; идентификаторы **`id`** у существующих строк сохраняют, новые — с серверными или клиентскими UUID по договорённости.

        Конфликты при совместном редактировании — через версионирование или ETag на усмотрение бэкенда (в этой спецификации не задано).
      operationId: putAdminOrders
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [orders]
              properties:
                orders:
                  type: array
                  items:
                    $ref: '#/components/schemas/AdminOrder'
      responses:
        '204':
          description: Сохранено без тела ответа
        '200':
          description: Опционально — возврат актуального списка после сохранения
          content:
            application/json:
              schema:
                type: object
                required: [orders]
                properties:
                  orders:
                    type: array
                    items:
                      $ref: '#/components/schemas/AdminOrder'
        '400':
          description: Ошибка валидации (неверные даты, enum и т.д.)
        '401':
          description: Не авторизован

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    ProductId:
      name: productId
      in: path
      required: true
      description: Стабильный идентификатор товара в каталоге (тот же `id`, что в **`product.id`** в ответах списков и карточки).
      schema:
        type: string
    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSize:
      name: pageSize
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 16

  schemas:
    SiteContact:
      type: object
      description: |
        Контакты для шапки (номер с `sm+`), мобильного меню, футера и `/contacts`.

        Телефон в админке вводят в одном поле с автоопределением BY/RU. После определения страны UI применяет маску:
        - BY: `+375 ** ***-**-**`
        - RU: `+7 *** ***-**-**`
        Сохраняемое значение `phoneTel` нормализовано для `tel:` (только `+` и цифры).
      required: [phoneDisplay, phoneTel, email]
      properties:
        phoneDisplay:
          type: string
          example: '+375 29 212-83-21'
          description: Номер для отображения. В полосе шапки — только при `sm+` (крупный акцентный текст). До `sm` в шапке не показывают; звонок — через номер в мобильном меню или `/contacts`. В меню и на `/contacts` — этот же текст как видимая часть ссылки `tel:`.
        phoneTel:
          type: string
          example: '+375292128321'
          description: Тот же номер для `href` схемы `tel:` (цифры/плюс, без пробелов и скобок) — в мобильном меню, на `/contacts` и в шапке при `sm+`.
        email:
          type: string
          format: email
          description: Почта для `mailto:` в мобильном меню и отображения на `/contacts`.
        addressDisplay:
          type: string
          description: |
            Адрес магазина, шоурума или юрлица в свободной форме, одной строкой или с переносами — для страницы
            «Контакты» (`/contacts`), поле «Адрес». Не координаты для карты, а текст для человека (при необходимости карту подключают отдельно).

    SiteBrand:
      type: object
      description: |
        Бренд в шапке и смежных экранах. Полный контракт «что приходит с API → как рисует клиент» — в описании
        операции **`GET /api/site-config`** (раздел **`brand`**): комбинации `logoUrl` / `logoColor`, маска, встроенный знак,
        требования к прозрачности файла и ориентир по пропорциям.

        Объект целиком опционален; пустые строки в полях эквивалентны «не задано».
      properties:
        logoUrl:
          type: string
          description: |
            Публичный URL изображения логотипа (SVG, PNG, WebP и т.д.) или **пустая строка**, если используется только
            встроенный знак. Для боевого API — стабильный **HTTPS**-URL после загрузки в хранилище; схема `data:` возможна
            в демо/черновиках. Пустой `logoUrl` + пустой `logoColor` → встроенный знак в цвете темы; пустой `logoUrl` +
            заданный `logoColor` → встроенный знак в этом цвете.
          example: https://cdn.example.com/brand/logo.svg
        logoColor:
          type: string
          pattern: '^#[0-9A-Fa-f]{6}$|^$'
          description: |
            Цвет акцента знака: **`#RRGGBB`** (шесть hex-цифр) или **пустая строка** (цвет из темы витрины).
            При **непустом** `logoUrl` и **непустом** `logoColor` клиент применяет **CSS mask**: альфа файла задаёт форму,
            заливка — этот цвет (нужна прозрачность у файла). При пустом `logoColor` и непустом `logoUrl` — обычный `<img>`
            без перекраски.
          example: '#7c3aed'
        logoAlt:
          type: string
          description: |
            Краткое имя магазина для доступности: `aria-label` ссылки с логотипом, скрытый текст, подсказка при наведении,
            резервный текст если картинка не загрузилась.
          example: Bulai Shop
        logoHref:
          type: string
          description: |
            Цель навигации по клику на знак: относительный путь витрины (например `/`, `/catalog`) или полный URL.
            Клиент оборачивает логотип в ссылку с этим `href` (и с `logoAlt` для подписи).
          example: /

    SocialLink:
      type: object
      description: |
        Одна соцсеть или мессенджер из админки «Соцсети» (`/admin/site-settings`).
        Каждый элемент несёт ключ логотипа/иконки, ссылку и подпись для доступности.
      required: [id, name, href]
      properties:
        id:
          type: string
          description: |
            Ключ для выбора бренд-иконки/логотипа на фронте.
            Примеры: `vk`, `telegram`, `whatsapp`, `viber`, `max`, `youtube`, `instagram`, `tiktok`, `facebook`, `odnoklassniki`.
        name:
          type: string
          description: Подпись для `aria-label` / всплывающей подсказки.
        href:
          type: string
          format: uri
          description: URL профиля или чата; внешние ссылки — с `target="_blank"` и `rel="noopener"`.

    PromoMaterials:
      type: object
      description: |
        Ответ `GET /api/promo-materials`. Обязательное поле — лента в шапке; остальные ключи можно
        добавлять по мере появления сценариев (баннеры, ссылки «Подробнее», A/B и т.д.).
        Допускаются неизвестные поля на клиенте — игнорировать, пока не поддержаны в UI.
        Редактирование в админке: лента — **`/admin/promo-materials/ticker`**; Hero-блоки шапки (заготовка UI) — **`/admin/promo-materials/banner`**. Отдельно от **`SiteConfig`**.
      required: [tickerMessages]
      properties:
        tickerMessages:
          type: array
          items:
            type: string
          description: Короткие строки по очереди **по центру** верхней индиго-полосы над навбаром (доставка, скидки, подсказки).
        promoCodes:
          type: array
          description: |
            Опциональный список промокодов для промо-UI и справки оператору.
            Если `validUntil` отсутствует или пустая строка — промокод бессрочный.
          items:
            $ref: '#/components/schemas/PromoCode'
      additionalProperties: true

    PromoCode:
      type: object
      required: [name, code, percent]
      description: Описание промокода для UI/маркетинга (не заменяет серверную валидацию в checkout).
      properties:
        name:
          type: string
          description: Название акции или человекочитаемая подпись.
          example: Скидка для новых клиентов
        code:
          type: string
          description: Промокод в верхнем регистре.
          example: HELLO15
        percent:
          type: integer
          minimum: 0
          maximum: 100
          description: Процент скидки.
          example: 15
        validUntil:
          type: string
          nullable: true
          description: |
            Дата окончания действия промокода в формате `YYYY-MM-DD`.
            Если поле пустое или `null`, период действия считается бессрочным.
          example: '2026-12-31'

    SiteConfig:
      type: object
      description: |
        Полный ответ `GET /api/site-config`. Назначение полей по зонам UI — в описании операции
        «Логотип, контакты, соцсети…». Объект `brand` опционален. Промо-лента **не** входит в эту схему — см. `PromoMaterials` и **`GET /api/promo-materials`**. Админка: **`/admin/site-settings`**.
      required: [contact, socialLinks, footer]
      properties:
        brand:
          $ref: '#/components/schemas/SiteBrand'
        contact:
          $ref: '#/components/schemas/SiteContact'
        socialLinks:
          type: array
          description: |
            Полный список соцсетей/мессенджеров из админки.
            В каждой записи приходят ключ логотипа (`id`) и ссылка (`href`); используется в футере и внизу мобильного меню шапки.
          items:
            $ref: '#/components/schemas/SocialLink'
        footer:
          type: object
          description: |
            Юридическая и брендовая подпись в футере сайта.
            Источник данных — секция «Реквизиты» в админке (`/admin/site-settings`).
          required: [legalEntityLine, shopNameLine]
          properties:
            legalEntityLine:
              type: string
              description: |
                Реквизиты продавца для футера. Допускается многострочный текст:
                одна строка = один реквизит (например, ИП/ООО, УНП, расчетный счет, банк).
              example: "ИП Иванов И.И.\nУНП 123456789\nр/с BY00BBBB30120000000000000000"
            shopNameLine:
              type: string
              description: |
                Подпись магазина для футера: копирайт, год и/или бренд.
                Обычно отображается перед реквизитами.
              example: "© 2026 Интернет-магазин bulai.by"

    HomeHero:
      type: object
      description: Первый экран главной (под шапкой). Заголовок собирают из `titleLines`; бейдж на десктопе часто со ссылкой в каталог.
      properties:
        badgeText:
          type: string
          description: Текст в «пилюле» над заголовком (например, анонс коллекции).
        badgeLinkHref:
          type: string
          description: URL или путь для ссылки внутри бейджа (например `/catalog`).
        badgeLinkLabel:
          type: string
          description: Текст ссылки в бейдже (например «Смотреть →»).
        titleLines:
          type: array
          items:
            type: string
          description: Строки многострочного H1; порядок = порядок отображения сверху вниз.
        subtitle:
          type: string
          description: Подзаголовок под H1 (абзац серым).
        ctaLabel:
          type: string
          description: Подпись основной кнопки под текстом.
        ctaHref:
          type: string
          description: Назначение CTA (каталог, акция и т.д.).

    HomeFeature:
      type: object
      required: [name, description, icon]
      description: Одна карточка в сетке «почему мы» / преимуществ на главной.
      properties:
        name:
          type: string
          description: Заголовок карточки.
        description:
          type: string
          description: Развёрнутый текст под заголовком.
        icon:
          type: string
          description: Ключ иконки (truck, shield, arrowPath, lock — маппинг на фронте)
          enum: [truck, shield, arrowPath, lock]

    HomeCategoryCard:
      type: object
      required: [name, description, imageUrl, href]
      description: Карточка категории или направления в секции превью перед каталогом.
      properties:
        name:
          type: string
        description:
          type: string
        imageUrl:
          type: string
          format: uri
        href:
          type: string
          description: Ссылка в каталог с нужными query-параметрами или на лендинг.
        featuredTitle:
          type: boolean
          description: Если true — заголовок карточки визуально крупнее (как «фичер»-категория).

    HomeServicePoint:
      type: object
      required: [name, description, illustrationImageUrl]
      description: Пункт в блоке «наши преимущества» под популярными товарами (иконка/иллюстрация + текст).
      properties:
        name:
          type: string
        description:
          type: string
        illustrationImageUrl:
          type: string
          format: uri
          description: URL изображения слева от текста (SVG или растр).

    FaqItem:
      type: object
      required: [question, answer]
      description: Одна строка аккордеона FAQ на главной.
      properties:
        question:
          type: string
          description: Заголовок раскрывающейся панели.
        answer:
          type: string
          description: Полный текст ответа (при необходимости с `\n` для абзацев).

    HomeContent:
      type: object
      description: |
        Редакционный контент главной страницы **`/`**. Визуальный порядок: `hero` → `featuresSection` → `categoriesSection` →
        сетка **«Популярные»** (**4 товара из класса A** ABC по заказам и оценкам — **`GET /api/products/popular`**) → `advantagesSection` → `faqSection`.
        Опционально на той же странице — блок **«Отзывы»**: **`GET /api/reviews`**, **«Оставить отзыв»** → **`POST /api/reviews`** (авторизация; **`productId`** не обязателен).
        Отдельные ключи можно опускать, если бэкенд или клиент используют значения по умолчанию.
      properties:
        hero:
          $ref: '#/components/schemas/HomeHero'
        featuresSection:
          type: object
          description: Секция преимуществ в сетке (иконки + тексты).
          properties:
            eyebrow:
              type: string
              description: Короткая строка над основным заголовком секции.
            title:
              type: string
            subtitle:
              type: string
            items:
              type: array
              items:
                $ref: '#/components/schemas/HomeFeature'
        categoriesSection:
          type: object
          description: Карточки направлений/категорий со ссылками в каталог.
          properties:
            title:
              type: string
            catalogLinkLabel:
              type: string
            catalogHref:
              type: string
            cards:
              type: array
              items:
                $ref: '#/components/schemas/HomeCategoryCard'
        advantagesSection:
          type: object
          description: Блок «наши преимущества» под популярными — иллюстрации и тексты (часто доставка, возврат, гарантии).
          properties:
            title:
              type: string
            items:
              type: array
              items:
                $ref: '#/components/schemas/HomeServicePoint'
        faqSection:
          type: object
          description: Секция вопросов и ответов в виде аккордеона.
          properties:
            eyebrow:
              type: string
            title:
              type: string
            lead:
              type: string
              description: Вводный текст под заголовком FAQ.
            items:
              type: array
              items:
                $ref: '#/components/schemas/FaqItem'

    AboutValue:
      type: object
      required: [title, text, icon]
      properties:
        title:
          type: string
        text:
          type: string
        icon:
          type: string
          description: Ключ для Heroicons на фронте (sparkles, share, academicCap, …)

    AboutContent:
      type: object
      properties:
        hero:
          type: object
          properties:
            title:
              type: string
            paragraphs:
              type: array
              items:
                type: string
            collageImageUrls:
              type: array
              items:
                type: string
                format: uri
        mission:
          type: object
          properties:
            title:
              type: string
            paragraphs:
              type: array
              items:
                type: string
        bannerImageUrl:
          type: string
          format: uri
        valuesSection:
          type: object
          properties:
            title:
              type: string
            subtitle:
              type: string
            items:
              type: array
              items:
                $ref: '#/components/schemas/AboutValue'
        ctaSection:
          type: object
          properties:
            title:
              type: string
            email:
              type: string
            phoneDisplay:
              type: string
            phoneTel:
              type: string
            socialLinks:
              type: array
              items:
                $ref: '#/components/schemas/SocialLink'

    CatalogEditorialTab:
      type: object
      required: [label, title, body, imageUrl, imageAlt]
      properties:
        label:
          type: string
        title:
          type: string
        body:
          type: string
        imageUrl:
          type: string
          format: uri
        imageAlt:
          type: string

    CatalogEditorial:
      type: object
      properties:
        sectionTitle:
          type: string
        sectionLead:
          type: string
        tabs:
          type: array
          items:
            $ref: '#/components/schemas/CatalogEditorialTab'

    ProductCategory:
      type: string
      enum: [брюки, рубашки, майки]

    Fit:
      type: string
      enum: [slim, regular, relaxed, wide]

    Material:
      type: string
      enum: [хлопок, деним, смесовая, лен]

    Season:
      type: string
      enum: [лето, деми, зима]

    ColorSwatch:
      type: object
      description: |
        Один **вариант цвета** у товара. **`image`** — фото варианта для галереи (см. ниже).

        **Кружок выбора цвета:** проще и переносимее отдавать **`hex`** (`#RRGGBB`) — фронт сам задаёт заливку (`background-color`), без привязки API к классам Tailwind на клиенте. Поле **`className`** оставлено **опционально** для обратной совместимости или нестандартных заливок (градиент, token дизайн-системы). Если переданы **и** `hex`, **и** `className`, клиент может отдать приоритет **`hex`**. Для кружка рекомендуется передавать **хотя бы одно** из `hex` / `className`.
      required: [name, image]
      properties:
        name:
          type: string
          description: Подпись варианта («Чёрный», «Индиго») для доступности и заказа.
        hex:
          type: string
          pattern: '^#[0-9A-Fa-f]{6}$'
          description: |
            Доминирующий цвет варианта в HEX для заливки кружка на фронте (например `#1F2937`). Предпочтительный способ по сравнению с привязкой к CSS-классам.
        className:
          type: string
          description: |
            Опционально: CSS-класс заливки кружка (например Tailwind `bg-gray-950`), если бэкенд/дизайн не сводят оттенок к одному HEX.
        image:
          type: string
          format: uri
          description: |
            URL **фото товара в этом цвете** — то же поле используют миниатюры галереи, крупный кадр при выборе варианта и превью в блоке отзывов. Один `product.id`, несколько `colors[]` = несколько медиа-наборов по вариантам.

    Product:
      type: object
      description: |
        Витринная сущность товара для карточки и списков: цены, медиа вариантов, агрегаты отзывов, опции заказа.
      required:
        - id
        - name
        - price
        - image
        - rating
        - reviews
        - sizes
        - colors
      properties:
        id:
          type: string
          description: Уникальный id; совпадает с `{productId}` в URL **`GET /api/products/{productId}`**.
        name:
          type: string
          description: Заголовок H1 на странице товара и в карточках.
        price:
          type: string
          description: Текущая цена для отображения (формат строки как в UI, например с «₽»).
        oldPrice:
          type: string
          description: Зачёркнутая цена до скидки; показывают вместе с `discount`.
        discount:
          type: string
          description: Подпись скидочного бейджа (например «−20%»).
        image:
          type: string
          format: uri
          description: Основное изображение; если **`colors`** пустой, используют как единственное фото.
        rating:
          type: number
          description: |
            **Агрегат** только по отзывам **о этом SKU** (**`productId`** = **`product.id`**). Общие отзывы (**`productId: null`** в **`GET /api/reviews`**) **не** входят. Список см. **`GET /api/products/{productId}/reviews`**.
        reviews:
          type: integer
          description: |
            **Число** таких же товарных отзывов (без учёта общих). Для UI и метрик популярности; см. **«Отзывы»**.
        sizes:
          type: array
          items:
            type: string
          description: Доступные размеры для радиогруппы «Размер».
        colors:
          type: array
          items:
            $ref: '#/components/schemas/ColorSwatch'
          description: |
            Варианты расцветки. У каждого элемента своё **`image`** (фото варианта). Кружок в UI — по **`hex`** и/или **`className`** (см. `ColorSwatch`).
        updatedAt:
          type: string
          format: date-time
          description: |
            Момент последнего изменения карточки на сервере. Рекомендуется отдавать для **разруливания ничьих**
            при сортировке популярности (см. **`GET /api/products/popular`**).

    ProductMeta:
      type: object
      description: |
        Метаданные каталога для карточки и фильтров: **category** и **fit** — для фильтров каталога и текста «Особенности»;
        **material**, **season** — для описания; **isNew** — бейдж; **inStock** — доступность и кнопка «В корзину».
      required: [category, isNew, fit, material, season, inStock]
      properties:
        category:
          $ref: '#/components/schemas/ProductCategory'
        isNew:
          type: boolean
          description: Можно использовать для бейджа «Новинка» на карточке в сетке.
        fit:
          $ref: '#/components/schemas/Fit'
        material:
          $ref: '#/components/schemas/Material'
        season:
          $ref: '#/components/schemas/Season'
        inStock:
          type: boolean
          description: |
            Значение **false** — кнопка «В корзину» неактивна, бейдж «Нет в наличии».

    ProductWithMeta:
      type: object
      description: |
        Единый объект для **карточки в сетке каталога**, **популярных**, **рекомендаций**: **`product`** (витрина) + **`meta`** (атрибуты).
        Для **страницы одного товара** используют расширение **`ProductWithMetaRich`**.
      required: [product, meta]
      properties:
        product:
          $ref: '#/components/schemas/Product'
        meta:
          $ref: '#/components/schemas/ProductMeta'

    PopularProductsResponse:
      type: object
      required: [items]
      description: |
        Ответ **`GET /api/products/popular`**: **«Популярные на главной»**. Только товары **класса A** **ABC-анализа** по **заказам** и **оценкам (отзывам)**; внутри A — по убыванию **составного балла** (сумма удельных весов). Обычно до **4** элементов (`limit` по умолчанию).
        Формат элементов — как в **`GET /api/products`**.
      properties:
        items:
          type: array
          maxItems: 24
          description: Подмножество **класса A**, упорядочено по убыванию балла (заказы + отзывы); на главной ориентир — **4** позиции.
          items:
            $ref: '#/components/schemas/ProductWithMeta'

    ProductAccordionFeatures:
      type: object
      description: |
        **«Особенности»** — структурированно: четыре опциональных поля под основные атрибуты и массив **`any`** для остального текста.
        Значения **`category`**, **`fit`**, **`material`**, **`season`** обычно совпадают с **`meta`** (в человекочитаемом виде), но бэкенд может отдать **другой** текст для витрины. Фронт выводит их как строки вида «Категория: …» и т.д., если поле **не пустое**.
      properties:
        category:
          type: string
          description: Отображаемое значение категории (например `майки`).
        fit:
          type: string
          description: Посадка для покупателя (например `Приталенная`), может отличаться от сырого **`meta.fit`**.
        material:
          type: string
          description: Материал (например `смесовая`).
        season:
          type: string
          description: Сезон (например `лето`).
        any:
          type: array
          description: |
            Дополнительные пункты списка: пошив, фурнитура, дисклеймер про цвет на экране и т.п.
          items:
            type: string
      example:
        category: майки
        fit: Приталенная
        material: смесовая
        season: лето
        any:
          - 'Плотная строчка по швам, усиленные точки натяжения'
          - 'Фурнитура без никеля (по большинству моделей)'
          - 'Цвет на экране может слегка отличаться от реального — это норма для фото'

    ProductAccordionSections:
      type: object
      description: |
        Контент блока **«Дополнительная информация»** на **витринной** карточке товара: только **две** секции — **«Особенности»** (`features`) и **«Уход»** (`care`).

        Секции **«Доставка»** и **«Возврат»** сюда **не входят**: их задают в **админ-панели заказов** — см. **`POST /api/checkout`**, **`GET /api/me/orders`**.

        **`features`** — объект с полями **`category`**, **`fit`**, **`material`**, **`season`**, **`any`** (см. **`ProductAccordionFeatures`**). **`care`** — массив строк.
        Секции **опциональны**; пустой объект / пустой массив / отсутствие ключа — не показывать блок или пропускать.
      properties:
        features:
          $ref: '#/components/schemas/ProductAccordionFeatures'
        care:
          type: array
          description: |
            **«Уход».** Этикетка, стирка, глажка, сушка, деним/линяк и т.п.
          items:
            type: string
      example:
        features:
          category: майки
          fit: Приталенная
          material: смесовая
          season: лето
          any:
            - 'Плотная строчка по швам, усиленные точки натяжения'
            - 'Фурнитура без никеля (по большинству моделей)'
            - 'Цвет на экране может слегка отличаться от реального — это норма для фото'
        care:
          - 'Следуйте символам на вшивной этикетке — у разных цветов режим может отличаться'
          - 'Стирка при 30 °C, деликатный отжим; не использовать отбеливатель'
          - 'Гладить с изнанки при необходимости, средняя температура'
          - 'Не сушить на батарее и в прямых солнечных лучах — чтобы не выцвело'
          - 'Для денима и плотного хлопка: первая стирка отдельно, возможен лёгкий линяк'

    ProductWithMetaRich:
      description: |
        Ответ **`GET /api/products/{productId}`**: всё из **`ProductWithMeta`**, плюс опциональные **редакционные** поля страницы.
        Без `richDescription` / `accordionSections` клиент может собрать текст из **`meta`** и статических шаблонов.

        **Сводка полей корня JSON:** `product` (обяз.), `meta` (обяз.), `richDescription` (опц.), `accordionSections` (опц., объект **`ProductAccordionSections`**).
        **Внутри `product`:** обяз. `id`, `name`, `price`, `image`, `rating`, `reviews`, `sizes`, `colors`; опц. `oldPrice`, `discount`, `updatedAt`.
        **Внутри каждого `colors[]`:** обяз. `name`, `image`; для кружка — `hex` и/или `className` (см. `ColorSwatch`).
        **Внутри `meta`:** обяз. `category`, `isNew`, `fit`, `material`, `season`, `inStock`.
        **Внутри `accordionSections`:** опц. **`features`** (**`ProductAccordionFeatures`**: `category`, `fit`, `material`, `season`, `any[]`) и **`care`** (`string[]`). Доставка/возврат — **Заказы** / **Checkout**.
      example:
        product:
          id: string
          name: string
          price: string
          oldPrice: string
          discount: string
          image: https://example.com
          rating: 1
          reviews: 1
          sizes:
            - string
          colors:
            - name: string
              hex: '#1F2937'
              className: string
              image: https://example.com
          updatedAt: '2026-04-02T18:01:59.974Z'
        meta:
          category: майки
          isNew: true
          fit: slim
          material: смесовая
          season: лето
          inStock: true
        richDescription: string
        accordionSections:
          features:
            category: майки
            fit: Приталенная
            material: смесовая
            season: лето
            any:
              - 'Плотная строчка по швам…'
          care:
            - 'Следуйте символам на вшивной этикетке…'
            - 'Стирка при 30 °C…'
      allOf:
        - $ref: '#/components/schemas/ProductWithMeta'
        - type: object
          properties:
            richDescription:
              type: string
              description: |
                Развёрнутое описание товара; **HTML или plain** — договорённость клиента и API. Подставляют в блок «Описание» или рядом с ним.
            accordionSections:
              $ref: '#/components/schemas/ProductAccordionSections'

    CatalogReview:
      type: object
      description: |
        Один отзыв покупателя. **`productId: null`** — **общий** отзыв (магазин, сервис), только для **`GET /api/reviews`**, **без** влияния на рейтинг SKU. Если **`productId`** задан — тот же **`product.id`**, для карточки пересчитывают **`rating`** / **`reviews`**.
      required: [id, name, avatar, rating, text]
      properties:
        id:
          type: string
        name:
          type: string
        avatar:
          type: string
          format: uri
        rating:
          type: integer
          minimum: 1
          maximum: 5
        text:
          type: string
        productId:
          type: string
          nullable: true
          description: |
            **`null`** — отзыв без товара (общий). Иначе **`product.id`**; в **`GET .../products/{productId}/reviews`** совпадает с путём.

    ReviewListResponse:
      type: object
      required: [items, total]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/CatalogReview'
        total:
          type: integer

    WriteReviewBody:
      type: object
      required: [rating, text]
      description: Тело **`POST /api/products/{productId}/reviews`** — только оценка и текст (товар задаётся URL).
      properties:
        rating:
          type: integer
          minimum: 1
          maximum: 5
        text:
          type: string
          minLength: 3

    WriteStoreReviewBody:
      type: object
      required: [rating, text]
      description: |
        Тело **`POST /api/reviews`**. **`productId`** опционален: не передают или **`null`** — общий отзыв; иначе — то же по смыслу, что отзыв с карточки товара (пересчёт агрегатов).
      properties:
        rating:
          type: integer
          minimum: 1
          maximum: 5
        text:
          type: string
          minLength: 3
        productId:
          type: string
          nullable: true
          description: Опционально. Пропуск или **`null`** — отзыв без привязки к товару.

    PromoValidateRequest:
      type: object
      required: [code]
      description: |
        Тело **`POST /api/cart/promo/validate`**. Поле **`code`** — строка после **`trim`** и **`toUpperCase()`** на клиенте (ориентир — текущий React-клиент).
      properties:
        code:
          type: string
          minLength: 1
          description: Промокод в **верхнем регистре**, без ведущих/концевых пробелов.
      example:
        code: HELLO15

    PromoValidateResponse:
      type: object
      required: [valid]
      description: |
        Ответ проверки промокода. При **`valid: true`** клиент показывает скидку, используя **`percent`** от промежуточного итога корзины.
      properties:
        valid:
          type: boolean
          description: |
            **`true`** — код принят к применению в UI; **`false`** — отклонён.
        percent:
          type: integer
          minimum: 0
          maximum: 100
          description: |
            Процент скидки от **промежуточного итога** (сумма по строкам по ценам витрины). Имеет смысл при **`valid: true`**; при **`valid: false`** обычно опускают или **0**.

    CheckoutLine:
      type: object
      required: [productId, color, size, quantity]
      properties:
        productId:
          type: string
        color:
          type: string
        size:
          type: string
        quantity:
          type: integer
          minimum: 1

    CheckoutRequest:
      type: object
      required: [lines, contact, shipping, paymentMethod]
      properties:
        promoCode:
          type: string
          description: |
            Применённый промокод — в том же **нормализованном** виде, что уходил в **`POST /api/cart/promo/validate`** (**верхний регистр**). Опционально: если не передавать, заказ без купонной скидки. Сервер **обязан** перепроверить код при создании заказа.
        lines:
          type: array
          items:
            $ref: '#/components/schemas/CheckoutLine'
        contact:
          type: object
          required: [lastName, firstName, email, phone, termsAccepted]
          properties:
            lastName:
              type: string
            firstName:
              type: string
            email:
              type: string
              format: email
            phone:
              type: string
            termsAccepted:
              type: boolean
        shipping:
          type: object
          required: [country, city, postalCode, addressLine]
          properties:
            country:
              type: string
            city:
              type: string
            postalCode:
              type: string
            addressLine:
              type: string
        paymentMethod:
          type: string
          enum: [apple_pay, card, cash]

    CheckoutResponse:
      type: object
      properties:
        orderNumber:
          type: string
        message:
          type: string

    NotificationReceiveMethod:
      type: string
      enum: [sms, email, all]
      description: |
        Канал доставки уведомлений (**e-mail**, **SMS** или **оба**). Имеет смысл вместе с флагами **`notifyOrders`** и **`notifyPromotions`**: если флаг категории выключен, соответствующие сообщения не отправляют независимо от значения здесь.

    UserProfile:
      type: object
      description: |
        **Профиль покупателя** — данные для UI **`/profile`**, автозаполнения **чекаута** и коммуникаций. Все поля **опциональны** в JSON: при **`GET`** отсутствующие ключи трактуют как «не задано»; при **`PATCH`** не переданные поля **не** затирают сохранённые значения.

        **Группы:** личные данные и контакты (**`firstName`**, **`lastName`**, **`email`**, **`phone`**, **`birthday`**, **`avatarUrl`**); адрес доставки по умолчанию (**`country`**, **`streetAddress`**, **`city`**, **`region`**, **`postalCode`**); настройки рассылок (**`notifyReceiveMethod`**, **`notifyOrders`**, **`notifyPromotions`**).
      properties:
        firstName:
          type: string
          description: Имя; может прийти из OAuth и быть отредактировано.
        lastName:
          type: string
          description: Фамилия.
        phone:
          type: string
          description: Телефон в формате, принятом в магазине (например E.164 или локальная маска — договорённость с бэкендом).
        email:
          type: string
          format: email
          description: Контактный e-mail; часто совпадает с логином при входе по почте.
        birthday:
          type: string
          description: Дата рождения; в UI часто **ДД.ММ.ГГГГ**, в API допустим ISO **YYYY-MM-DD** — зафиксировать в имплементации.
        avatarUrl:
          type: string
          format: uri
          description: |
            URL фото профиля (CDN или аватар провайдера, например Яндекс). Загрузка файла с клиента — отдельным шагом (presigned URL / `multipart`) с записью сюда **`PATCH`**-ом, если не используете встроенную выдачу IdP.
        country:
          type: string
          description: Страна (строка для отображения или код — по договорённости).
        streetAddress:
          type: string
          description: Улица, дом, квартира.
        city:
          type: string
        region:
          type: string
          description: Область / край / штат при необходимости.
        postalCode:
          type: string
          description: Почтовый индекс.
        notifyReceiveMethod:
          $ref: '#/components/schemas/NotificationReceiveMethod'
        notifyOrders:
          type: boolean
          description: Согласие получать уведомления о статусах заказов (на выбранном канале(ах)).
        notifyPromotions:
          type: boolean
          description: Согласие на маркетинговые сообщения (акции, скидки).

    OrderPaymentStatus:
      type: string
      description: |
        Статус оплаты (админка и расширение **`Order`** в ЛК): **`unpaid`** — не оплачен; **`pending`** — ожидает оплаты; **`paid`** — оплачен; **`refunded`** — возврат; **`failed`** — ошибка оплаты.
      enum: [unpaid, pending, paid, refunded, failed]

    OrderPaymentMethod:
      type: string
      description: |
        Способ оплаты: **`unspecified`**, **`card`**, **`sbp`**, **`cash`**, **`bank_transfer`**, **`invoice`** (счёт для юрлица).
      enum: [unspecified, card, sbp, cash, bank_transfer, invoice]

    OrderStage:
      type: string
      description: |
        Этап выполнения (**таймлайн** и **канбан** в **`/admin/orders`**): **`new`** → **`assembly`** → **`shipping`** → **`delivery`** → **`delivered`**.
      enum: [new, assembly, shipping, delivery, delivered]

    AdminOrderLineItem:
      type: object
      description: |
        Одна позиция заказа в админке: вручную или из каталога (**`productId`**). Цена **`price`** — строка для отображения (например «12 500 ₽»), как в UI.
      required: [id, name, quantity]
      properties:
        id:
          type: string
          description: Стабильный id строки в черновике заказа
        productId:
          type: string
          description: Если позиция добавлена из каталога — **`product.id`**; при ручном правлении названия/размера/цвета связь снимают
        sku:
          type: string
          description: Артикул из каталога или введённый вручную
        name:
          type: string
        size:
          type: string
        color:
          type: string
        quantity:
          type: integer
          minimum: 1
        price:
          type: string
          description: Цена строки для отображения (формат как на витрине)

    AdminOrder:
      type: object
      description: |
        Заказ в админ-панели (**`/admin/orders`**): соответствует модели черновика в клиенте (`AdminOrderRow`). Даты — **`YYYY-MM-DD`**.

        Поле **`status`** — человекочитаемая подпись этапа; канонический этап для логики и канбана — **`stageId`** (**`OrderStage`**). При смене этапа в UI **`status`** обновляют вместе с **`stageId`**.
      required:
        - id
        - orderNumber
        - createdAt
        - customerName
        - total
        - status
        - paymentStatus
        - paymentMethod
        - stageId
      properties:
        id:
          type: string
          description: UUID или иной стабильный id заказа
        orderNumber:
          type: string
          description: Номер для отображения покупателю и в списках (например BUL-10042)
        createdAt:
          type: string
          format: date
          description: Дата создания заказа
        deliveryDate:
          type: string
          format: date
          description: Планируемая или фактическая дата доставки; пусто — не задана
        shippingDate:
          type: string
          format: date
          description: Дата отправки / передачи перевозчику
        customerName:
          type: string
          description: ФИО или подпись клиента одной строкой (сопоставление с карточкой клиента в админке — на стороне UI/API)
        total:
          type: string
          description: Итоговая сумма строкой для отображения (например «48 900 ₽»)
        status:
          type: string
          description: Текст статуса/этапа для таблицы (согласован с **`stageId`**)
        paymentStatus:
          $ref: '#/components/schemas/OrderPaymentStatus'
        paymentMethod:
          $ref: '#/components/schemas/OrderPaymentMethod'
        stageId:
          $ref: '#/components/schemas/OrderStage'
        trackingNumber:
          type: string
          description: Трек-номер отправления
        trackingUrl:
          type: string
          format: uri
          description: Ссылка на отслеживание у перевозчика
        items:
          type: array
          items:
            $ref: '#/components/schemas/AdminOrderLineItem'
        comment:
          type: string
          description: Внутреннее примечание к заказу

    OrderLine:
      type: object
      required:
        - id
        - name
        - priceRub
        - quantity
        - lineDiscountRub
        - lineTotalRub
        - color
        - colorSwatch
        - size
        - imageSrc
        - imageAlt
        - productHref
      properties:
        id:
          type: string
        name:
          type: string
        priceRub:
          type: integer
        quantity:
          type: integer
        lineDiscountRub:
          type: integer
        lineTotalRub:
          type: integer
        color:
          type: string
        colorSwatch:
          type: string
          description: CSS color (#hex)
        size:
          type: string
        imageSrc:
          type: string
          format: uri
        imageAlt:
          type: string
        productHref:
          type: string

    Order:
      type: object
      description: |
        Заказ покупателя в ответе **`GET /api/me/orders`**. Обязательные поля — история заказов в личном кабинете: суммы в **рублях** (целые), дата **`placedIso`**, строки **`OrderLine`**.

        **Опциональные** поля ниже — целевое расширение, согласованное с админ-моделью **`AdminOrder`**: даты доставки/отправки, отслеживание, оплата, этап. Пока бэкенд их не отдаёт, клиент может опускать ключи.

        Тексты **доставки** и **возврата** для покупателя задаются в админке и при расширении API логично отдавать здесь или в **`lines[]`**.
      required:
        - orderNumber
        - placedIso
        - subtotalRub
        - orderDiscountRub
        - totalRub
        - orderStatusText
        - orderDelivered
        - lines
      properties:
        orderNumber:
          type: string
        placedIso:
          type: string
          format: date
        subtotalRub:
          type: integer
        orderDiscountRub:
          type: integer
        totalRub:
          type: integer
        orderStatusText:
          type: string
        orderDelivered:
          type: boolean
        lines:
          type: array
          items:
            $ref: '#/components/schemas/OrderLine'
        id:
          type: string
          description: Внутренний id заказа на сервере (для ссылок и синхронизации с админкой)
        deliveryDate:
          type: string
          format: date
          description: Ожидаемая или фактическая дата доставки
        shippingDate:
          type: string
          format: date
          description: Дата отправки
        trackingNumber:
          type: string
        trackingUrl:
          type: string
          format: uri
        paymentStatus:
          $ref: '#/components/schemas/OrderPaymentStatus'
        paymentMethod:
          $ref: '#/components/schemas/OrderPaymentMethod'
        stageId:
          $ref: '#/components/schemas/OrderStage'
        comment:
          type: string
          description: Примечание/комментарий к заказу, если показывают покупателю
